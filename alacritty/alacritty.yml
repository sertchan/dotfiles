window:
  opacity: 0.82

font:
  size: 10
  normal:
    family: 'Jetbrains Mono Nerd Font'
    style: Regular

  bold:
    family: 'Jetbrains Mono Nerd Font'
    style: Bold

  italic:
    family: 'Jetbrains Mono Nerd Font'
    style: Italic

  bold_italic:
    family: 'Jetbrains Mono Nerd Font'
    style: Bold Italic

colors:
  primary:
    background: '#0a0a0a'
    foreground: '#c5c9c5'

  normal:
    black: '#0c0b0b'
    blue: '#8ba4b0'
    cyan: '#8ea4a2'
    green: '#8a9a7b'
    magenta: '#a292a3'
    red: '#c4746e'
    white: '#C8C093'
    yellow: '#c4b28a'

  bright:
    black: '#a6a69c'
    blue: '#7FB4CA'
    cyan: '#7AA89F'
    green: '#87a987'
    magenta: '#938AA9'
    red: '#E46876'
    white: '#c5c9c5'
    yellow: '#E6C384'

  selection:
    background: '#2d4f67'
    foreground: '#c8c093'

  indexed_colors:
    - { index: 16, color: '#ffa066' }
    - { index: 17, color: '#ff5d62' }
