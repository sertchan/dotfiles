# Preferences
general {
    layout = dwindle
    border_size = 0  
    gaps_in = 6
    gaps_out = 6  
}

# Decoration
decoration {
  blur {
          enabled = true
	  size = 9
	  passes = 2
        }
  drop_shadow = false
  layerrule = blur, waybar
}

animations {
    enabled = true 
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 75%
    animation = border, 0, 10, default
    animation = borderangle, 0, 8, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

# Dwindle layout settings
dwindle {
    pseudotile = true
    #no_gaps_when_only = 1
}

# Gestures
gestures {
    workspace_swipe = false
}

# Miscellaneous
misc {
    disable_hyprland_logo = true
    focus_on_activate = true
}

# Window rules
windowrulev2 = float, class:^(eog)$
windowrulev2 = forceinput, class:^(eog)$
windowrulev2 = noblur, class:^(eog)$

windowrulev2 = float, class:^(mpv)$
windowrulev2 = forceinput, class:^(mpv)$
windowrulev2 = noblur, class:^(mpv)$

windowrulev2 = noblur, class:^(Google-Chrome)$
windowrulev2 = forceinput, class:^(Google-Chrome)$

#windowrulev2 = opacity 0.85, class:^(obsidian)$
